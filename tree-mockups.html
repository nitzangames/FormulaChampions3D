<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Tree Mockups — Formula Champions 3D</title>
<style>
  html, body { margin: 0; padding: 0; background: #0f0f14; color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  h1 { text-align: center; padding: 20px 0 8px; font-weight: 800; letter-spacing: 1px; }
  p.sub { text-align: center; color: #888; margin: 0 0 16px; font-size: 14px; }
  .section { padding: 10px 20px 30px; }
  .section h2 { margin: 0 0 12px; font-size: 14px; color: #4ecdc4;
    letter-spacing: 2px; text-transform: uppercase; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px; }
  .card { background: #1a1a24; border: 1px solid #2a2a38; border-radius: 12px;
    overflow: hidden; }
  .card canvas { display: block; width: 100%; }
  .card .meta { padding: 12px 16px; }
  .card .name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .card .note { font-size: 12px; color: #999; line-height: 1.4; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<h1>Tree Mockups</h1>
<p class="sub">All 10 tree types — auto-rotating. Each track picks one type; size + height jitter per instance.</p>

<div class="section">
  <h2>Original Five</h2>
  <div class="grid" id="orig"></div>
</div>

<div class="section">
  <h2>Batch 2</h2>
  <div class="grid" id="new"></div>
</div>

<div class="section">
  <h2>Batch 3 — new</h2>
  <div class="grid" id="batch3"></div>
</div>

<div class="section">
  <h2>Roadside decor</h2>
  <div class="grid" id="decor"></div>
</div>

<div class="section">
  <h2>Track structures</h2>
  <div class="grid" id="structures"></div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Original 5 (matches scenery.js)

function buildSpruce() {
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.12, 0.18, 1.2, 5),
    new THREE.MeshLambertMaterial({ color: 0x8B6914 }));
  trunk.position.y = 0.6; g.add(trunk);
  const fol = new THREE.MeshLambertMaterial({ color: 0x228833 });
  const bot = new THREE.Mesh(new THREE.ConeGeometry(0.9, 1.2, 5), fol);
  bot.position.y = 1.6; g.add(bot);
  const top = new THREE.Mesh(new THREE.ConeGeometry(0.6, 0.9, 5), fol);
  top.position.y = 2.4; g.add(top);
  return g;
}

function buildPine() {
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.08, 0.14, 1.6, 5),
    new THREE.MeshLambertMaterial({ color: 0x6b4a1f }));
  trunk.position.y = 0.8; g.add(trunk);
  const fol = new THREE.Mesh(
    new THREE.ConeGeometry(0.55, 3.0, 5),
    new THREE.MeshLambertMaterial({ color: 0x1b5c2f }));
  fol.position.y = 2.8; g.add(fol);
  return g;
}

function buildPalm() {
  const g = new THREE.Group();
  const trunkMat = new THREE.MeshLambertMaterial({ color: 0x886a3a });
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.16, 2.8, 6), trunkMat);
  trunk.position.y = 1.4; g.add(trunk);
  const ringMat = new THREE.MeshLambertMaterial({ color: 0x5a4528 });
  for (let i = 0; i < 6; i++) {
    const ring = new THREE.Mesh(new THREE.TorusGeometry(0.1, 0.02, 4, 8), ringMat);
    ring.rotation.x = Math.PI / 2; ring.position.y = 0.3 + i * 0.4; g.add(ring);
  }
  const frondMat = new THREE.MeshLambertMaterial({ color: 0x2a9a42, side: THREE.DoubleSide });
  const FRONDS = 9, SEGS = 4, FRONDLEN = 1.3;
  for (let i = 0; i < FRONDS; i++) {
    const a = (i / FRONDS) * Math.PI * 2;
    const yaw = new THREE.Matrix4().makeRotationY(a);
    const verts = [];
    for (let s = 0; s <= SEGS; s++) {
      const t = s / SEGS;
      const r = t * FRONDLEN;
      const y = 2.8 + 0.2 - t * t * 1.2;
      const halfW = 0.2 * (1 - t * 0.7);
      verts.push(new THREE.Vector3(r, y, -halfW).applyMatrix4(yaw));
      verts.push(new THREE.Vector3(r, y,  halfW).applyMatrix4(yaw));
    }
    const geo = new THREE.BufferGeometry();
    const pos = [], idx = [];
    for (const v of verts) pos.push(v.x, v.y, v.z);
    for (let s = 0; s < SEGS; s++) {
      const a0 = s * 2, a1 = a0 + 1, a2 = a0 + 2, a3 = a0 + 3;
      idx.push(a0, a1, a2, a1, a3, a2);
    }
    geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    geo.setIndex(idx); geo.computeVertexNormals();
    g.add(new THREE.Mesh(geo, frondMat));
  }
  const cocoMat = new THREE.MeshLambertMaterial({ color: 0x3a2a18 });
  for (let i = 0; i < 4; i++) {
    const a = (i / 4) * Math.PI * 2;
    const c = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6, 5), cocoMat);
    c.position.set(Math.cos(a) * 0.16, 2.75, Math.sin(a) * 0.16);
    g.add(c);
  }
  return g;
}

function buildBroadleaf() {
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.14, 0.22, 1.2, 6),
    new THREE.MeshLambertMaterial({ color: 0x5a3a1a }));
  trunk.position.y = 0.6; g.add(trunk);
  const fol = new THREE.MeshLambertMaterial({ color: 0x3ba046 });
  const blobs = [
    { y: 1.75, r: 0.95, x: 0,     z: 0     },
    { y: 2.05, r: 0.75, x: 0.35,  z: 0     },
    { y: 2.05, r: 0.75, x: -0.35, z: 0     },
    { y: 2.05, r: 0.75, x: 0,     z: 0.4   },
    { y: 2.3,  r: 0.65, x: 0,     z: -0.25 },
    { y: 2.5,  r: 0.55, x: 0.15,  z: 0.15  },
  ];
  for (const b of blobs) {
    const s = new THREE.Mesh(new THREE.IcosahedronGeometry(b.r, 0), fol);
    s.position.set(b.x, b.y, b.z); g.add(s);
  }
  return g;
}

function buildCactus() {
  const g = new THREE.Group();
  const mat = new THREE.MeshLambertMaterial({ color: 0x3a7a3a });
  const darkMat = new THREE.MeshLambertMaterial({ color: 0x2c5a2c });
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.32, 2.6, 8), mat);
  trunk.position.y = 1.3; g.add(trunk);
  const cap = new THREE.Mesh(new THREE.SphereGeometry(0.28, 8, 6, 0, Math.PI * 2, 0, Math.PI / 2), mat);
  cap.position.y = 2.6; g.add(cap);
  const armLh = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.18, 0.5, 8), mat);
  armLh.rotation.z = Math.PI / 2; armLh.position.set(-0.35, 1.4, 0); g.add(armLh);
  const armLv = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.17, 1.1, 8), mat);
  armLv.position.set(-0.65, 1.9, 0); g.add(armLv);
  const armLc = new THREE.Mesh(new THREE.SphereGeometry(0.16, 8, 6, 0, Math.PI * 2, 0, Math.PI / 2), mat);
  armLc.position.set(-0.65, 2.45, 0); g.add(armLc);
  const armRh = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.17, 0.45, 8), mat);
  armRh.rotation.z = -Math.PI / 2; armRh.position.set(0.33, 1.7, 0); g.add(armRh);
  const armRv = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.16, 0.7, 8), mat);
  armRv.position.set(0.58, 2.1, 0); g.add(armRv);
  const armRc = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 6, 0, Math.PI * 2, 0, Math.PI / 2), mat);
  armRc.position.set(0.58, 2.45, 0); g.add(armRc);
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2;
    const rib = new THREE.Mesh(new THREE.BoxGeometry(0.04, 2.5, 0.02), darkMat);
    rib.position.set(Math.cos(a) * 0.3, 1.3, Math.sin(a) * 0.3); g.add(rib);
  }
  return g;
}

// ─────────────────────────────────────────────────────────────────────────────
// New 5

function buildBirch() {
  const g = new THREE.Group();
  const trunkMat = new THREE.MeshLambertMaterial({ color: 0xf0ece2 });
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.11, 2.4, 6), trunkMat);
  trunk.position.y = 1.2; g.add(trunk);
  const markMat = new THREE.MeshLambertMaterial({ color: 0x1a1a1a });
  for (let i = 0; i < 8; i++) {
    const mark = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.03, 0.02), markMat);
    const a = Math.random() * Math.PI * 2;
    mark.position.set(Math.cos(a) * 0.105, 0.3 + i * 0.28, Math.sin(a) * 0.105);
    mark.rotation.y = a; g.add(mark);
  }
  const fol = new THREE.MeshLambertMaterial({ color: 0x9ac93a });
  const blobs = [
    { y: 2.4, r: 0.55, x: 0,    z: 0    },
    { y: 2.65, r: 0.4, x: 0.25, z: 0.1  },
    { y: 2.65, r: 0.4, x: -0.2, z: -0.1 },
    { y: 2.85, r: 0.35, x: 0.05, z: 0.15 },
  ];
  for (const b of blobs) {
    const s = new THREE.Mesh(new THREE.IcosahedronGeometry(b.r, 0), fol);
    s.position.set(b.x, b.y, b.z); g.add(s);
  }
  return g;
}

function buildCherryBlossom() {
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.11, 0.16, 1.0, 6),
    new THREE.MeshLambertMaterial({ color: 0x4a3020 }));
  trunk.position.y = 0.5; g.add(trunk);
  const pink = new THREE.MeshLambertMaterial({ color: 0xf5a9c3 });
  const pinkDeep = new THREE.MeshLambertMaterial({ color: 0xe77fa8 });
  const blobs = [
    { y: 1.5,  r: 0.85, x: 0,     z: 0,     mat: pink     },
    { y: 1.75, r: 0.7,  x: 0.4,   z: 0.05,  mat: pinkDeep },
    { y: 1.75, r: 0.7,  x: -0.4,  z: -0.05, mat: pink     },
    { y: 1.8,  r: 0.65, x: 0.05,  z: 0.45,  mat: pinkDeep },
    { y: 1.95, r: 0.55, x: 0,     z: -0.3,  mat: pink     },
    { y: 2.1,  r: 0.45, x: 0.15,  z: 0.1,   mat: pinkDeep },
  ];
  for (const b of blobs) {
    const s = new THREE.Mesh(new THREE.IcosahedronGeometry(b.r, 0), b.mat);
    s.position.set(b.x, b.y, b.z); g.add(s);
  }
  return g;
}

function buildAutumnMaple() {
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.13, 0.2, 1.1, 6),
    new THREE.MeshLambertMaterial({ color: 0x4a2e14 }));
  trunk.position.y = 0.55; g.add(trunk);
  const red = new THREE.MeshLambertMaterial({ color: 0xd9481f });
  const orange = new THREE.MeshLambertMaterial({ color: 0xe88020 });
  const yellow = new THREE.MeshLambertMaterial({ color: 0xedb24b });
  const blobs = [
    { y: 1.65, r: 0.95, x: 0,     z: 0,     mat: red    },
    { y: 1.95, r: 0.75, x: 0.4,   z: 0.0,   mat: orange },
    { y: 1.95, r: 0.75, x: -0.4,  z: 0.0,   mat: orange },
    { y: 1.95, r: 0.75, x: 0.0,   z: 0.45,  mat: yellow },
    { y: 2.15, r: 0.6,  x: 0.05,  z: -0.3,  mat: red    },
    { y: 2.4,  r: 0.5,  x: 0.15,  z: 0.1,   mat: orange },
  ];
  for (const b of blobs) {
    const s = new THREE.Mesh(new THREE.IcosahedronGeometry(b.r, 0), b.mat);
    s.position.set(b.x, b.y, b.z); g.add(s);
  }
  return g;
}

function buildAcacia() {
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.09, 0.18, 2.2, 6),
    new THREE.MeshLambertMaterial({ color: 0x6a4a24 }));
  trunk.position.y = 1.1; g.add(trunk);
  const canopyMat = new THREE.MeshLambertMaterial({ color: 0x4a7b3a });
  const canopy = new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.1, 0.4, 10), canopyMat);
  canopy.position.y = 2.3; g.add(canopy);
  const dome = new THREE.Mesh(
    new THREE.SphereGeometry(1.1, 10, 5, 0, Math.PI * 2, 0, Math.PI / 2),
    canopyMat);
  dome.position.y = 2.5; g.add(dome);
  return g;
}

function buildBamboo() {
  const g = new THREE.Group();
  const stalkMat = new THREE.MeshLambertMaterial({ color: 0x5a9a3a });
  const jointMat = new THREE.MeshLambertMaterial({ color: 0x3a7a28 });
  const leafMat = new THREE.MeshLambertMaterial({ color: 0x88c050, side: THREE.DoubleSide });

  const STALKS = 6;
  for (let i = 0; i < STALKS; i++) {
    const a = (i / STALKS) * Math.PI * 2 + Math.random() * 0.3;
    const r = 0.15 + Math.random() * 0.25;
    const x = Math.cos(a) * r;
    const z = Math.sin(a) * r;
    const height = 2.4 + Math.random() * 1.2;
    const stalk = new THREE.Mesh(
      new THREE.CylinderGeometry(0.06, 0.07, height, 5), stalkMat);
    stalk.position.set(x, height / 2, z); g.add(stalk);
    const joints = Math.floor(height / 0.5);
    for (let j = 1; j <= joints; j++) {
      const ring = new THREE.Mesh(new THREE.TorusGeometry(0.075, 0.015, 4, 8), jointMat);
      ring.rotation.x = Math.PI / 2;
      ring.position.set(x, j * 0.5, z); g.add(ring);
    }
    for (let l = 0; l < 3; l++) {
      const leaf = new THREE.Mesh(new THREE.PlaneGeometry(0.35, 0.08), leafMat);
      const la = Math.random() * Math.PI * 2;
      leaf.position.set(x + Math.cos(la) * 0.12, height - 0.2 - l * 0.25, z + Math.sin(la) * 0.12);
      leaf.rotation.y = la; leaf.rotation.z = -0.2;
      g.add(leaf);
    }
  }
  return g;
}

// ─────────────────────────────────────────────────────────────────────────────
// Renderer helper

function mount(containerId, buildFn, name, note) {
  const card = document.createElement('div');
  card.className = 'card';
  const host = document.createElement('div'); card.appendChild(host);
  const meta = document.createElement('div'); meta.className = 'meta';
  meta.innerHTML = '<div class="name">' + name + '</div>' +
    '<div class="note">' + note + '</div>';
  card.appendChild(meta);
  document.getElementById(containerId).appendChild(card);

  const W = 300, H = 360;
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x4fa44a);
  const cam = new THREE.PerspectiveCamera(30, W / H, 0.1, 100);
  cam.lookAt(0, 1.5, 0);

  const sun = new THREE.DirectionalLight(0xffffff, 0.8);
  sun.position.set(5, 8, 4);
  scene.add(sun);
  scene.add(new THREE.AmbientLight(0xffffff, 0.55));

  const ground = new THREE.Mesh(
    new THREE.CircleGeometry(5, 32),
    new THREE.MeshLambertMaterial({ color: 0x3b8a36 }));
  ground.rotation.x = -Math.PI / 2; scene.add(ground);

  scene.add(buildFn());

  const r = new THREE.WebGLRenderer({ antialias: true });
  r.setSize(W, H); host.appendChild(r.domElement);

  const RADIUS = 10, CAM_Y = 3.5;
  let angle = 0;
  function loop() {
    angle += 0.01;
    cam.position.x = Math.cos(angle) * RADIUS;
    cam.position.y = CAM_Y;
    cam.position.z = Math.sin(angle) * RADIUS;
    cam.lookAt(0, 1.5, 0);
    r.render(scene, cam);
    requestAnimationFrame(loop);
  }
  loop();
}

mount('orig', buildSpruce,    'Spruce',    'Two-cone conifer. All-rounder.');
mount('orig', buildPine,      'Pine',      'Tall narrow cone. Alpine feel.');
mount('orig', buildPalm,      'Palm',      '3D arched fronds. Tropical.');
mount('orig', buildBroadleaf, 'Broadleaf', 'Puffy deciduous crown.');
mount('orig', buildCactus,    'Cactus',    'Saguaro. Desert theme.');

mount('new', buildBirch,         'Birch',          'Tall skinny white trunk with black dashes, sparse green crown.');
mount('new', buildCherryBlossom, 'Cherry Blossom', 'Pink puffy crown. Spring feel.');
mount('new', buildAutumnMaple,   'Autumn Maple',   'Red/orange/yellow crown. Fall feel.');
mount('new', buildBamboo,        'Bamboo',         'Cluster of 6 thin green stalks with joint rings.');

// ─── Batch 3 ───────────────────────────────────────────────────────────────

function buildDeadTree() {
  const group = new THREE.Group();
  const woodMat = new THREE.MeshLambertMaterial({ color: 0x5a4838 });
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.24, 1.6, 6), woodMat);
  trunk.position.y = 0.8; group.add(trunk);
  const MAIN = 5;
  for (let i = 0; i < MAIN; i++) {
    const a = (i / MAIN) * Math.PI * 2;
    const len = 0.9 + Math.random() * 0.4;
    const tilt = 0.5 + Math.random() * 0.3;
    const pivot = new THREE.Group();
    pivot.position.set(Math.cos(a) * 0.1, 1.55, Math.sin(a) * 0.1);
    pivot.rotateY(-a);
    pivot.rotateZ(-tilt);
    const branch = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.09, len, 5), woodMat);
    branch.position.y = len / 2;
    pivot.add(branch);
    if (Math.random() < 0.7) {
      const twigLen = 0.3 + Math.random() * 0.3;
      const twigTilt = -0.3 + Math.random() * 0.6;
      const tp = new THREE.Group();
      tp.position.y = len;
      tp.rotateZ(twigTilt);
      const twig = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.04, twigLen, 4), woodMat);
      twig.position.y = twigLen / 2;
      tp.add(twig);
      pivot.add(tp);
    }
    group.add(pivot);
  }
  return group;
}

function buildWillow() {
  const group = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.2, 1.0, 6),
    new THREE.MeshLambertMaterial({ color: 0x4e3620 }));
  trunk.position.y = 0.5; group.add(trunk);
  const leafMat = new THREE.MeshLambertMaterial({ color: 0x86a63a });
  const canopy = new THREE.Mesh(new THREE.SphereGeometry(0.9, 10, 8), leafMat);
  canopy.position.y = 1.6; canopy.scale.set(1.0, 0.9, 1.0); group.add(canopy);
  const strandMat = new THREE.MeshLambertMaterial({ color: 0x96b04a });
  for (let i = 0; i < 18; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = 0.15 + Math.random() * 0.35;
    const len = 0.6 + Math.random() * 0.7;
    const strand = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.02, len, 4), strandMat);
    strand.position.set(Math.cos(a) * r, 1.6 - len / 2 + 0.1, Math.sin(a) * r);
    group.add(strand);
  }
  return group;
}

function buildBaobab() {
  const group = new THREE.Group();
  const trunkMat = new THREE.MeshLambertMaterial({ color: 0x9a7844 });
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.75, 2.0, 8), trunkMat);
  trunk.position.y = 1.0; group.add(trunk);
  const base = new THREE.Mesh(
    new THREE.SphereGeometry(0.75, 8, 6, 0, Math.PI * 2, 0, Math.PI / 2), trunkMat);
  base.position.y = 0.3; base.scale.set(1, 0.4, 1); group.add(base);
  const leafMat = new THREE.MeshLambertMaterial({ color: 0x4a6a32 });
  const bl = 0.6;
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * Math.PI * 2;
    const tilt = 0.9;
    const pivot = new THREE.Group();
    pivot.position.set(Math.cos(a) * 0.3, 2.0, Math.sin(a) * 0.3);
    pivot.rotateY(-a);
    pivot.rotateZ(-tilt);
    const branch = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.09, bl, 5), trunkMat);
    branch.position.y = bl / 2;
    pivot.add(branch);
    const leaves = new THREE.Mesh(new THREE.IcosahedronGeometry(0.32, 0), leafMat);
    leaves.position.y = bl + 0.18;
    pivot.add(leaves);
    group.add(pivot);
  }
  return group;
}

function buildRedwood() {
  const group = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.24, 3.2, 7),
    new THREE.MeshLambertMaterial({ color: 0x7a3a20 }));
  trunk.position.y = 1.6; group.add(trunk);
  const fol = new THREE.MeshLambertMaterial({ color: 0x1e4a2a });
  const cones = [
    { h: 2.0, r: 0.9, y: 3.2 },
    { h: 1.6, r: 0.7, y: 4.1 },
    { h: 1.2, r: 0.5, y: 4.85 },
  ];
  for (const c of cones) {
    const cone = new THREE.Mesh(new THREE.ConeGeometry(c.r, c.h, 6), fol);
    cone.position.y = c.y; group.add(cone);
  }
  return group;
}

function buildJoshuaTree() {
  const group = new THREE.Group();
  const woodMat = new THREE.MeshLambertMaterial({ color: 0x6a4a28 });
  const needleMat = new THREE.MeshLambertMaterial({ color: 0x4a5f28 });
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.17, 0.24, 1.3, 6), woodMat);
  trunk.position.y = 0.65; group.add(trunk);
  function spikyTuft() {
    const tuft = new THREE.Group();
    for (let i = 0; i < 10; i++) {
      const a = Math.random() * Math.PI * 2;
      const pitch = Math.random() * Math.PI * 0.6;
      const needle = new THREE.Mesh(new THREE.ConeGeometry(0.04, 0.22, 4), needleMat);
      needle.position.set(
        Math.cos(a) * Math.sin(pitch) * 0.1,
        Math.cos(pitch) * 0.1,
        Math.sin(a) * Math.sin(pitch) * 0.1,
      );
      needle.rotation.z = Math.cos(a) * pitch;
      needle.rotation.x = -Math.sin(a) * pitch;
      tuft.add(needle);
    }
    return tuft;
  }
  const branches = [
    { a: 0.3, tilt: 0.9, len: 0.9, yStart: 1.2 },
    { a: 2.5, tilt: 0.7, len: 1.1, yStart: 1.1 },
    { a: 4.5, tilt: 0.8, len: 0.8, yStart: 1.25 },
  ];
  for (const b of branches) {
    const pivot = new THREE.Group();
    pivot.position.set(0, b.yStart, 0);
    pivot.rotateY(-b.a);
    pivot.rotateZ(-b.tilt);
    const branch = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.11, b.len, 5), woodMat);
    branch.position.y = b.len / 2;
    pivot.add(branch);
    const tuft = spikyTuft();
    tuft.position.y = b.len + 0.08;
    pivot.add(tuft);
    group.add(pivot);
  }
  const top = spikyTuft();
  top.position.y = 1.4;
  group.add(top);
  return group;
}

function buildMediumRock() {

function buildGrassTuft() {
  const group = new THREE.Group();
  const mat = new THREE.MeshLambertMaterial({ color: 0x66a02a, side: THREE.DoubleSide });
  for (let i = 0; i < 5; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = Math.random() * 0.12;
    const blade = new THREE.Mesh(new THREE.PlaneGeometry(0.06, 0.2), mat);
    blade.position.set(Math.cos(a) * r, 0.1, Math.sin(a) * r);
    blade.rotation.y = Math.random() * Math.PI * 2;
    blade.rotation.z = (Math.random() - 0.5) * 0.3;
    group.add(blade);
  }
  return group;
}

function buildBush() {
  const group = new THREE.Group();
  const mat = new THREE.MeshLambertMaterial({ color: 0x4a8a2a });
  const blobs = [
    { y: 0.22, r: 0.25, x: 0,     z: 0     },
    { y: 0.32, r: 0.2,  x: 0.15,  z: 0.05  },
    { y: 0.3,  r: 0.22, x: -0.12, z: 0.1   },
    { y: 0.28, r: 0.18, x: 0.05,  z: -0.12 },
  ];
  for (const b of blobs) {
    const s = new THREE.Mesh(new THREE.IcosahedronGeometry(b.r, 0), mat);
    s.position.set(b.x, b.y, b.z);
    group.add(s);
  }
  return group;
}

function buildHayBale() {

function buildMushroom() {

// Custom mount that frames small objects closer.
function mountDecor(containerId, buildFn, name, note) {
  const card = document.createElement('div');
  card.className = 'card';
  const host = document.createElement('div'); card.appendChild(host);
  const meta = document.createElement('div'); meta.className = 'meta';
  meta.innerHTML = '<div class="name">' + name + '</div>' +
    '<div class="note">' + note + '</div>';
  card.appendChild(meta);
  document.getElementById(containerId).appendChild(card);

  const W = 300, H = 360;
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x4fa44a);
  const cam = new THREE.PerspectiveCamera(30, W / H, 0.1, 100);

  const sun = new THREE.DirectionalLight(0xffffff, 0.8);
  sun.position.set(5, 8, 4);
  scene.add(sun);
  scene.add(new THREE.AmbientLight(0xffffff, 0.55));

  const ground = new THREE.Mesh(
    new THREE.CircleGeometry(2, 24),
    new THREE.MeshLambertMaterial({ color: 0x3b8a36 }));
  ground.rotation.x = -Math.PI / 2; scene.add(ground);

  scene.add(buildFn());

  const r = new THREE.WebGLRenderer({ antialias: true });
  r.setSize(W, H); host.appendChild(r.domElement);

  const RADIUS = 2.5, CAM_Y = 1.3;
  let angle = 0;
  function loop() {
    angle += 0.01;
    cam.position.x = Math.cos(angle) * RADIUS;
    cam.position.y = CAM_Y;
    cam.position.z = Math.sin(angle) * RADIUS;
    cam.lookAt(0, 0.3, 0);
    r.render(scene, cam);
    requestAnimationFrame(loop);
  }
  loop();
}

function buildMegaGrandstand(length) {
  const g = new THREE.Group();
  const structureMat = new THREE.MeshLambertMaterial({ color: 0x505866 });
  const roofMat = new THREE.MeshLambertMaterial({ color: 0x262d38 });
  const TIERS = 7, TIER_H = 0.55, TIER_D = 0.5;
  for (let i = 0; i < TIERS; i++) {
    const tier = new THREE.Mesh(new THREE.BoxGeometry(length, TIER_H, TIER_D), structureMat);
    tier.position.set(0, TIER_H / 2 + i * TIER_H, -i * TIER_D);
    g.add(tier);
  }
  const crowdColors = [0xff5722, 0xffeb3b, 0x4caf50, 0x2196f3, 0xe91e63, 0xffffff, 0x9c27b0, 0xff9800];
  for (let i = 0; i < TIERS; i++) {
    const rowY = TIER_H + i * TIER_H + 0.18;
    const rowZ = -i * TIER_D;
    const heads = Math.floor(length / 0.22);
    for (let h = 0; h < heads; h++) {
      if (Math.random() < 0.15) continue;
      const color = crowdColors[Math.floor(Math.random() * crowdColors.length)];
      const head = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.34, 0.16),
        new THREE.MeshLambertMaterial({ color }));
      head.position.set(-length / 2 + 0.12 + h * 0.22, rowY, rowZ + TIER_D / 2 - 0.02);
      g.add(head);
    }
  }
  const totalDepth = TIERS * TIER_D + 0.3;
  const roofY = TIERS * TIER_H + 1.2;
  const roof = new THREE.Mesh(new THREE.BoxGeometry(length + 0.4, 0.15, totalDepth + 0.2), roofMat);
  roof.position.set(0, roofY, -totalDepth / 2 + 0.5);
  g.add(roof);
  const postMat = new THREE.MeshLambertMaterial({ color: 0x30383f });
  for (const sx of [-1, 1]) {
    const fp = new THREE.Mesh(new THREE.BoxGeometry(0.14, roofY, 0.14), postMat);
    fp.position.set(sx * (length / 2 - 0.1), roofY / 2, 0.25);
    g.add(fp);
    const bp = new THREE.Mesh(new THREE.BoxGeometry(0.14, roofY, 0.14), postMat);
    bp.position.set(sx * (length / 2 - 0.1), roofY / 2, -totalDepth + 0.45);
    g.add(bp);
  }
  const bannerBgMat = new THREE.MeshLambertMaterial({ color: 0xe63946 });
  const banner = new THREE.Mesh(new THREE.BoxGeometry(length, 0.65, 0.08), bannerBgMat);
  banner.position.set(0, roofY - 0.35, 0.35);
  g.add(banner);
  const stripe = new THREE.Mesh(new THREE.BoxGeometry(length - 0.2, 0.15, 0.02),
    new THREE.MeshLambertMaterial({ color: 0xffffff }));
  stripe.position.set(0, roofY - 0.35, 0.4);
  g.add(stripe);
  const chSize = 0.35;
  const m1 = new THREE.MeshLambertMaterial({ color: 0x000000 });
  const m2 = new THREE.MeshLambertMaterial({ color: 0xffffff });
  for (let r = 0; r < 2; r++) {
    for (let c = 0; c < 4; c++) {
      const mat = ((r + c) % 2 === 0) ? m1 : m2;
      const tile = new THREE.Mesh(new THREE.BoxGeometry(chSize, chSize, 0.02), mat);
      tile.position.set(-(4 * chSize) / 2 + c * chSize + chSize / 2, roofY - 0.1 - r * chSize, 0.42);
      g.add(tile);
    }
  }
  return g;
}

function buildFlagTowerPreview() {
  const g = new THREE.Group();
  const whiteMat = new THREE.MeshLambertMaterial({ color: 0xf0f0f0 });
  const redMat = new THREE.MeshLambertMaterial({ color: 0xc92a2a });
  const darkMat = new THREE.MeshLambertMaterial({ color: 0x2a2a33 });
  const metalMat = new THREE.MeshLambertMaterial({ color: 0x808088 });
  const base = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.12, 0.9), darkMat);
  base.position.y = 0.06; g.add(base);
  const TRUNK_H = 3.2, BAND_H = 0.35;
  const bands = Math.floor(TRUNK_H / BAND_H);
  for (let i = 0; i < bands; i++) {
    const band = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.22, BAND_H, 8),
      i % 2 === 0 ? redMat : whiteMat);
    band.position.y = 0.12 + BAND_H / 2 + i * BAND_H;
    g.add(band);
  }
  const trunkTopY = 0.12 + bands * BAND_H;
  const boothH = 0.8;
  const booth = new THREE.Mesh(new THREE.BoxGeometry(0.95, boothH, 0.95),
    new THREE.MeshLambertMaterial({ color: 0xf5f0e2 }));
  booth.position.y = trunkTopY + boothH / 2; g.add(booth);
  const winBand = new THREE.Mesh(new THREE.BoxGeometry(0.97, 0.35, 0.97),
    new THREE.MeshLambertMaterial({ color: 0x222833 }));
  winBand.position.y = trunkTopY + 0.55; g.add(winBand);
  const roof = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.12, 1.1), darkMat);
  roof.position.y = trunkTopY + boothH + 0.06; g.add(roof);
  const poleH = 1.5;
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, poleH, 5), metalMat);
  pole.position.y = trunkTopY + boothH + 0.12 + poleH / 2; g.add(pole);
  const FW = 0.9, FH = 0.55;
  const fg = new THREE.Group();
  fg.position.set(FW / 2, trunkTopY + boothH + 0.12 + poleH - FH / 2 - 0.05, 0);
  const flag = new THREE.Mesh(new THREE.PlaneGeometry(FW, FH),
    new THREE.MeshLambertMaterial({ color: 0x3ba046, side: THREE.DoubleSide }));
  fg.add(flag);
  const accent = new THREE.Mesh(new THREE.PlaneGeometry(FW, FH / 3),
    new THREE.MeshLambertMaterial({ color: 0xffffff, side: THREE.DoubleSide }));
  accent.position.set(0, -FH / 3, 0.002);
  fg.add(accent);
  g.add(fg);
  return g;
}

// Big mount helper for structures — wider camera radius.
function mountStructure(containerId, buildFn, name, note, camRadius = 14, camY = 5, lookY = 2) {
  const card = document.createElement('div');
  card.className = 'card';
  const host = document.createElement('div'); card.appendChild(host);
  const meta = document.createElement('div'); meta.className = 'meta';
  meta.innerHTML = '<div class="name">' + name + '</div><div class="note">' + note + '</div>';
  card.appendChild(meta);
  document.getElementById(containerId).appendChild(card);

  const W = 420, H = 420;
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x4fa44a);
  const cam = new THREE.PerspectiveCamera(35, W / H, 0.1, 200);
  const sun = new THREE.DirectionalLight(0xffffff, 0.8);
  sun.position.set(5, 8, 4); scene.add(sun);
  scene.add(new THREE.AmbientLight(0xffffff, 0.55));
  const ground = new THREE.Mesh(new THREE.CircleGeometry(12, 32),
    new THREE.MeshLambertMaterial({ color: 0x3b8a36 }));
  ground.rotation.x = -Math.PI / 2; scene.add(ground);
  scene.add(buildFn());
  const r = new THREE.WebGLRenderer({ antialias: true });
  r.setSize(W, H); host.appendChild(r.domElement);
  let angle = 0;
  function loop() {
    angle += 0.006;
    cam.position.x = Math.cos(angle) * camRadius;
    cam.position.y = camY;
    cam.position.z = Math.sin(angle) * camRadius;
    cam.lookAt(0, lookY, 0);
    r.render(scene, cam);
    requestAnimationFrame(loop);
  }
  loop();
}
