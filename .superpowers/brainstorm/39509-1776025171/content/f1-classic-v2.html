<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Classic F1 - V2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0d14; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  h1 { text-align: center; padding: 24px 0 4px; font-size: 28px; color: #fff; }
  .subtitle { text-align: center; color: #888; margin-bottom: 24px; font-size: 14px; }
  .container { max-width: 700px; margin: 0 auto; padding: 0 20px 40px; }
  .mockup { border: 2px solid #4ecdc4; border-radius: 12px; overflow: hidden; background: #161622; }
  .mockup canvas { width: 100%; height: 440px; display: block; }
  .label { padding: 14px 16px; background: #1a1a26; font-size: 14px; color: #ccc; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<h1>Classic F1 — Side Pods Integrated</h1>
<p class="subtitle">Side pods now flow into the body instead of sticking out</p>

<div class="container">
  <div class="mockup">
    <canvas id="scene"></canvas>
    <div class="label">Side pods are narrower, taper into the body, and sit lower</div>
  </div>
</div>

<script>
function mat(color) { return new THREE.MeshLambertMaterial({ color }); }
function box(w, h, d) { return new THREE.BoxGeometry(w, h, d); }
function cyl(rt, rb, h, seg) { return new THREE.CylinderGeometry(rt, rb, h, seg || 8); }

function addMesh(g, geo, m, x, y, z) {
  const mesh = new THREE.Mesh(geo, m);
  mesh.position.set(x, y, z);
  mesh.castShadow = true;
  g.add(mesh);
  return mesh;
}

function addWheel(g, x, y, z, radius) {
  const r = radius || 0.22;
  const tire = new THREE.Mesh(cyl(r, r, 0.18, 12), mat(0x1a1a1a));
  tire.rotation.z = Math.PI / 2;
  tire.position.set(x, y, z);
  tire.castShadow = true;
  g.add(tire);
}

const canvas = document.getElementById('scene');
const w = canvas.clientWidth * 2, h = 880;
canvas.width = w; canvas.height = h;

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(w, h, false);
renderer.setClearColor(0x2a2a3a);
renderer.shadowMap.enabled = true;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(35, w / h, 0.1, 100);

const sun = new THREE.DirectionalLight(0xffffff, 1.0);
sun.position.set(5, 8, 5);
sun.castShadow = true;
scene.add(sun);
scene.add(new THREE.AmbientLight(0x6677aa, 0.5));

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(20, 20),
  mat(0x444455)
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

const g = new THREE.Group();
const red = mat(0xdd2222);
const dark = mat(0x222222);
const white = mat(0xeeeeee);

// ── Monocoque tub — wider at middle, tapers toward front/back ───────────────
// Main central tub (wider than before to blend with side pods)
addMesh(g, box(0.9, 0.3, 1.8), red, 0, 0.3, 0.1);

// Front of tub (narrower, just ahead of cockpit)
addMesh(g, box(0.55, 0.28, 0.5), red, 0, 0.28, -0.95);

// ── Nose — long and pointy ──────────────────────────────────────────────────
addMesh(g, box(0.35, 0.2, 0.8), red, 0, 0.26, -1.55);
addMesh(g, box(0.2, 0.15, 0.2), red, 0, 0.24, -2.0);

// ── Side pods — INTEGRATED into body ────────────────────────────────────────
// Narrower, lower, positioned at sides of the main tub
// Main body is ±0.45 wide, side pods sit just outside that
addMesh(g, box(0.2, 0.22, 0.95), red, -0.55, 0.24, 0.15);
addMesh(g, box(0.2, 0.22, 0.95), red, 0.55, 0.24, 0.15);

// Side pod intake (black rectangles at front of pods)
addMesh(g, box(0.18, 0.1, 0.05), dark, -0.55, 0.26, -0.3);
addMesh(g, box(0.18, 0.1, 0.05), dark, 0.55, 0.26, -0.3);

// ── Cockpit ─────────────────────────────────────────────────────────────────
addMesh(g, box(0.5, 0.15, 0.5), red, 0, 0.48, -0.2);

// Driver helmet
addMesh(g, new THREE.SphereGeometry(0.14, 12, 10), white, 0, 0.62, -0.2);

// ── Engine cover — slopes up behind driver ──────────────────────────────────
addMesh(g, box(0.5, 0.35, 0.8), red, 0, 0.5, 0.55);

// Airbox above driver
addMesh(g, box(0.3, 0.25, 0.3), dark, 0, 0.75, 0.2);

// ── Rear wing — tall and thin ───────────────────────────────────────────────
addMesh(g, box(1.0, 0.04, 0.2), dark, 0, 0.75, 1.1);
addMesh(g, box(0.03, 0.3, 0.25), dark, -0.5, 0.62, 1.1);
addMesh(g, box(0.03, 0.3, 0.25), dark, 0.5, 0.62, 1.1);
addMesh(g, box(0.1, 0.3, 0.05), dark, 0, 0.62, 1.07);

// ── Front wing ──────────────────────────────────────────────────────────────
addMesh(g, box(0.9, 0.04, 0.15), dark, 0, 0.15, -2.1);
addMesh(g, box(0.03, 0.15, 0.2), dark, -0.44, 0.18, -2.1);
addMesh(g, box(0.03, 0.15, 0.2), dark, 0.44, 0.18, -2.1);

// ── Wheels ──────────────────────────────────────────────────────────────────
addWheel(g, -0.7, 0.22, -1.2, 0.26);
addWheel(g, 0.7, 0.22, -1.2, 0.26);
addWheel(g, -0.75, 0.26, 0.8, 0.3);
addWheel(g, 0.75, 0.26, 0.8, 0.3);

scene.add(g);

let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.008;
  camera.position.x = Math.sin(t) * 5;
  camera.position.z = Math.cos(t) * 5;
  camera.position.y = 1.8;
  camera.lookAt(0, 0.3, 0);
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
